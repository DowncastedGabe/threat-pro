services:
  tor:
    image: dperson/torproxy:latest
    container_name: threat-intel-tor
    restart: unless-stopped
    # Porta 9050 apenas acessível internamente na threat-network
    # NÃO exponha 9050 externamente por segurança
    networks:
      - threat-network

  api:
    build: .
    container_name: threat-intel-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/threatintel
    volumes:
      - .:/app
      - ./data:/app/data
    restart: unless-stopped
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      db:
        condition: service_healthy
      tor:
        condition: service_started
    networks:
      - threat-network

  db:
    image: postgres:15-alpine
    container_name: threat-intel-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=threatintel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - threat-network

  frontend:
    build: ./frontend
    container_name: threat-intel-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - ./frontend/.env
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    networks:
      - threat-network

networks:
  threat-network:
    driver: bridge

volumes:
  frontend_node_modules:
  postgres_data: